user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format lb_log '$remote_addr - [$time_local] "$request" '
                       'upstream=$upstream_addr status=$status '
                       'rt=$request_time uart=$upstream_response_time';

    access_log /var/log/nginx/access.log lb_log;
    error_log  /var/log/nginx/error.log;

    # Swappable upstream block — controller service overwrites this file
    # and reloads nginx to switch strategies live, no rebuild needed.
    include /etc/nginx/active_upstream.conf;

    server {
        listen 80;

        location /nginx_health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Upstream-Server $upstream_addr always;
        }
    }
}