user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format lb_log '$remote_addr - [$time_local] "$request" '
                       'upstream=$upstream_addr status=$status '
                       'rt=$request_time uart=$upstream_response_time';

    access_log /var/log/nginx/access.log lb_log;
    error_log  /var/log/nginx/error.log;

    # --- Load balancing strategy -------------------------------------------
    # Default: round robin (nginx's built-in default, no directive needed).
    # To compare strategies, swap the commented line in and rebuild/restart nginx:
    #
    #   least_conn;   -> sends each request to the backend with fewest active connections
    #   ip_hash;      -> pins a given client IP to the same backend (sticky sessions)
    #
    # (Task 4 will let this be switched from the React UI instead of edited by hand.)
    upstream django_backend {
        # least_conn;
        # ip_hash;
        server backend1:8000;
        server backend2:8000;
        server backend3:8000;
        server backend4:8000;
    }

    server {
        listen 80;

        location /nginx_health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Surface which backend instance actually served the request —
            # useful for proving traffic is really being distributed across
            # the 4 instances (check this response header in the browser/hey/Locust output).
            add_header X-Upstream-Server $upstream_addr always;
        }
    }
}