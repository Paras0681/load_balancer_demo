global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'django_backends'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'backend1:8000'
          - 'backend2:8000'
          - 'backend3:8000'
          - 'backend4:8000'